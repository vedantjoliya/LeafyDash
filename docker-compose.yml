version: "3.8"

services:
  company-sim:
    build: .
    container_name: company-sim
    ports:
      - "5000:5000"
    volumes:
      - db-data:/app/instance
    environment:
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-for-company-sim}
      - FLASK_APP=app.py
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  db-data:
