<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Customer Feedback | Leafy Dash</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/images/leafy_icon.png">
    <style>
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
        }
        .star-rating input {
            display: none;
        }
        .star-rating label {
            font-size: 2.5rem;
            color: rgba(15, 23, 42, 0.15);
            cursor: pointer;
            transition: var(--transition);
        }
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label {
            color: #fbbf24;
            transform: scale(1.15);
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container glass-panel">
            <div class="auth-header">
                <div class="auth-logo" style="font-size: 1.5rem; justify-content: center;">
                    <img src="/images/leafy_icon.png" alt="Leafy Logo" style="width: 56px; height: 56px; object-fit: contain;">
                    Customer Feedback Portal
                </div>
                <h2 class="auth-title" id="businessHeading" style="font-size: 1.3rem; margin-top: 10px;">Share your experience</h2>
                <p class="auth-subtitle">Your feedback helps us serve you better.</p>
            </div>
            
            <div id="feedbackAlert"></div>

            <form id="feedbackForm">
                <div class="form-group">
                    <label for="customerName" class="form-label">Your Name</label>
                    <input type="text" id="customerName" class="form-control" placeholder="e.g. John Doe" required autocomplete="name">
                </div>

                <div class="form-group" style="text-align: center;">
                    <label class="form-label">How would you rate us?</label>
                    <div class="star-rating">
                        <input type="radio" id="star5" name="rating" value="5" required>
                        <label for="star5">★</label>
                        <input type="radio" id="star4" name="rating" value="4">
                        <label for="star4">★</label>
                        <input type="radio" id="star3" name="rating" value="3">
                        <label for="star3">★</label>
                        <input type="radio" id="star2" name="rating" value="2">
                        <label for="star2">★</label>
                        <input type="radio" id="star1" name="rating" value="1">
                        <label for="star1">★</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="comment" class="form-label">Comments (Optional)</label>
                    <textarea id="comment" class="form-control" rows="4" placeholder="Tell us more about your experience..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Submit Feedback</button>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        let businessId = null;
        let locationId = null;

        document.addEventListener('DOMContentLoaded', () => {
            // Extract business user ID from URL path /review/{user_id}
            const pathParts = window.location.pathname.split('/');
            businessId = pathParts[pathParts.length - 1];

            const urlParams = new URLSearchParams(window.location.search);
            locationId = urlParams.get('location_id');
            
            if (!businessId || isNaN(businessId)) {
                document.getElementById('feedbackForm').style.display = 'none';
                document.getElementById('feedbackAlert').innerHTML = `
                    <div class="alert-box alert-danger">
                        <span>Error: Invalid feedback link.</span>
                    </div>
                `;
            }
        });

        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const customerName = document.getElementById('customerName').value;
            const ratingElement = document.querySelector('input[name="rating"]:checked');
            const comment = document.getElementById('comment').value;
            const alertContainer = document.getElementById('feedbackAlert');
            
            alertContainer.innerHTML = '';

            const nameError = validateRequiredString(customerName, "Your Name");
            if (nameError) {
                alertContainer.innerHTML = `
                    <div class="alert-box alert-danger">
                        <span>Error: ${nameError}</span>
                    </div>
                `;
                return;
            }

            if (!ratingElement) {
                alertContainer.innerHTML = `
                    <div class="alert-box alert-warning">
                        <span>Warning: Please choose a star rating.</span>
                    </div>
                `;
                return;
            }

            const rating = parseInt(ratingElement.value);
            
            try {
                const response = await fetch(`/api/public/review/${businessId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customer_name: customerName,
                        rating: rating,
                        comment: comment || "",
                        location_id: locationId ? parseInt(locationId) : null
                    })
                });
                
                if (response.ok) {
                    alertContainer.innerHTML = `
                        <div class="alert-box alert-success">
                            <span>Success: Thank you for your feedback! It was submitted successfully.</span>
                        </div>
                    `;
                    document.getElementById('feedbackForm').reset();
                    // Disable form controls
                    document.querySelectorAll('.form-control, button, input').forEach(el => el.disabled = true);
                } else {
                    const errData = await response.json().catch(() => ({}));
                    const errMsg = errData.detail || "Submission failed. Business portal could not process the entry.";
                    alertContainer.innerHTML = `
                        <div class="alert-box alert-danger">
                            <span>Error: ${errMsg}</span>
                        </div>
                    `;
                }
            } catch (err) {
                alertContainer.innerHTML = `
                    <div class="alert-box alert-danger">
                        <span>Error: Network error. Please check connection.</span>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
