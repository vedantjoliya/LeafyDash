<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Setup Wizard | Leafy Dash</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="icon" type="image/png" href="/images/leafy_icon.png">
</head>
<body>
    <div class="auth-wrapper" style="align-items: center; justify-content: center; min-height: 100vh;">
        <div id="onboardingContainer" class="onboarding-wizard glass-panel" style="max-width: 600px; padding: 40px;">
            <!-- Loading Spinner (initially visible) -->
            <div id="loaderArea" class="onboarding-loader">
                <div class="spinner"></div>
                <h3 id="loaderText" style="font-family: var(--font-title); margin-bottom: 12px;">Initializing System...</h3>
                <p id="loaderSubtext" style="color: var(--text-secondary); font-size: 0.95rem;">Checking registration status</p>
            </div>

            <!-- Questionnaire UI (hidden initially) -->
            <div id="questionnaireArea" style="display: none;">
                <!-- Elegant Progress Bar -->
                <div style="height: 4px; background: rgba(0, 0, 0, 0.05); border-radius: 2px; margin-bottom: 32px; overflow: hidden;">
                    <div id="progressBar" style="width: 0%; height: 100%; background: var(--accent-gradient); transition: width 0.3s ease;"></div>
                </div>

                <div class="onboarding-question-card">
                    <div class="question-text" id="questionTitle" style="font-family: var(--font-title); font-size: 1.4rem;">Loading questions...</div>
                    <div class="options-list" id="optionsContainer">
                        <!-- Dynamic Options buttons -->
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; margin-top: 40px; align-items: center;">
                    <button id="prevBtn" class="btn btn-secondary" onclick="prevStep()" style="visibility: hidden;">Previous</button>
                    <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;" id="stepProgress">Step 1 of 7</div>
                    <button id="nextBtn" class="btn btn-primary" onclick="nextStep()" disabled>Continue</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        let questions = [];
        let currentStep = 0;
        let selectedAnswers = {}; // Map of question key -> selected value

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('user_token');
            if (!token) {
                window.location.href = '/login';
                return;
            }

            try {
                showLoader("Loading Questions...", "Retrieving feature configuration questions for your account");
                const response = await fetch('/api/onboarding/questions', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 403) {
                    showLoaderError("Access Denied", "Your account needs admin approval before proceeding.");
                    return;
                }

                if (!response.ok) {
                    throw new Error("Failed to load onboarding");
                }

                const data = await response.json();
                questions = data.questions;

                hideLoader();
                renderQuestion();

            } catch (err) {
                showLoaderError("System Offline", "Failed to retrieve onboarding questions. Check database connection.");
            }
        });

        function showLoader(title, subtext) {
            document.getElementById('loaderArea').style.display = 'flex';
            document.getElementById('questionnaireArea').style.display = 'none';
            document.getElementById('loaderText').textContent = title;
            document.getElementById('loaderSubtext').textContent = subtext;
        }

        function showLoaderError(title, subtext) {
            const loaderArea = document.getElementById('loaderArea');
            loaderArea.innerHTML = `
                <h3 style="font-family: var(--font-title); margin-bottom: 12px; color: var(--danger); margin-top: 20px;">${title}</h3>
                <p style="color: var(--text-secondary); margin-bottom: 24px;">${subtext}</p>
                <a href="/login" class="btn btn-secondary">Return to Sign In</a>
            `;
        }

        function hideLoader() {
            document.getElementById('loaderArea').style.display = 'none';
            document.getElementById('questionnaireArea').style.display = 'block';
        }

        function renderQuestion() {
            if (questions.length === 0) return;
            
            const q = questions[currentStep];
            document.getElementById('questionTitle').textContent = q.question;
            document.getElementById('stepProgress').textContent = `Question ${currentStep + 1} of ${questions.length}`;

            // Update Progress Bar
            const percent = ((currentStep + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = `${percent}%`;

            // Back button visibility
            document.getElementById('prevBtn').style.visibility = currentStep === 0 ? 'hidden' : 'visible';

            // Options rendering
            const container = document.getElementById('optionsContainer');
            container.innerHTML = q.options.map(opt => {
                const isSelected = selectedAnswers[q.key] === opt.value;
                return `
                    <button class="option-btn ${isSelected ? 'selected' : ''}" onclick="selectOption('${q.key}', '${opt.value}')">
                        <span>${escapeHtml(opt.label)}</span>
                        <span class="option-bullet"></span>
                    </button>
                `;
            }).join('');

            // Update Next button label and status
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.disabled = !selectedAnswers[q.key];
            if (currentStep === questions.length - 1) {
                nextBtn.textContent = "Deploy Custom Dashboard";
            } else {
                nextBtn.textContent = "Continue";
            }
        }

        function selectOption(questionKey, optionValue) {
            selectedAnswers[questionKey] = optionValue;
            renderQuestion();
        }

        function prevStep() {
            if (currentStep > 0) {
                currentStep--;
                renderQuestion();
            }
        }

        async function nextStep() {
            const currentQ = questions[currentStep];
            if (!selectedAnswers[currentQ.key]) return;

            if (currentStep < questions.length - 1) {
                currentStep++;
                renderQuestion();
            } else {
                // Submit answers
                const token = localStorage.getItem('user_token');
                showLoader("Configuring Dashboard...", "Mounting selected modules and features to your workspace.");
                
                try {
                    const response = await fetch('/api/onboarding/submit', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ answers: selectedAnswers })
                    });
                    
                    if (response.ok) {
                        localStorage.setItem('user_status', 'onboarded');
                        showLoader("Starting Workspace...", "Routing you to your personalized business platform...");
                        setTimeout(() => {
                            window.location.href = '/dashboard';
                        }, 1000);
                    } else {
                        showLoaderError("Deployment Failed", "Dashboard configuration encountered an issue. Please try again.");
                    }
                } catch (err) {
                    showLoaderError("Connection Lost", "Failed to deploy dashboard config. Check network settings.");
                }
            }
        }
    </script>
</body>
</html>
