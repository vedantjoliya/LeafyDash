<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminated | Company Sim</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%20width='32'%20height='32'%3E%3Crect%20width='24'%20height='24'%20rx='6'%20fill='%23111111'/%3E%3Crect%20width='12'%20height='12'%20x='6'%20y='6'%20rx='1.5'%20fill='none'%20stroke='%2339e622'%20stroke-width='1.5'/%3E%3Crect%20width='4'%20height='4'%20x='10'%20y='10'%20rx='0.5'%20fill='none'%20stroke='%2339e622'%20stroke-width='1.5'/%3E%3Cpath%20d='M10%202v4'%20stroke='%2339e622'%20stroke-width='1.5'%20stroke-linecap='round'/%3E%3Cpath%20d='M14%202v4'%20stroke='%2339e622'%20stroke-width='1.5'%20stroke-linecap='round'/%3E%3Cpath%20d='M10%2018v4'%20stroke='%2339e622'%20stroke-width='1.5'%20stroke-linecap='round'/%3E%3Cpath%20d='M14%2018v4'%20stroke='%2339e622'%20stroke-width='1.5'%20stroke-linecap='round'/%3E%3Cpath%20d='M18%2010h4'%20stroke='%2339e622'%20stroke-width='1.5'%20stroke-linecap='round'/%3E%3Cpath%20d='M18%2014h4'%20stroke='%2339e622'%20stroke-width='1.5'%20stroke-linecap='round'/%3E%3Cpath%20d='M2%2010h4'%20stroke='%2339e622'%20stroke-width='1.5'%20stroke-linecap='round'/%3E%3Cpath%20d='M2%2014h4'%20stroke='%2339e622'%20stroke-width='1.5'%20stroke-linecap='round'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { background: #1a1a1a; color: #fff; justify-content: center; align-items: center; }
        .pink-slip { background: #ffebee; border: 1px solid #ffcdd2; color: #c62828; padding: 50px; border-radius: 8px; max-width: 500px; text-align: center; font-family: var(--font-body); }
        .pink-slip h1 { font-family: var(--font-heading); font-size: 3rem; margin-bottom: 20px; color: #b71c1c; }
        .pink-slip p { font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="pink-slip">
        <h1 data-translate="fired_header">Notice of Termination</h1>
        <p data-translate="fired_desc">Your employment has been terminated effective immediately due to repeated failures in executing your assigned tasks. Please pack your desk.</p>
        <button class="btn-danger" onclick="window.location.href='/'" data-translate="btn_return">Return to Home</button>
    </div>

    <script>
        const translations = {
            en: {
                fired_header: "Notice of Termination",
                fired_desc: "Your employment has been terminated effective immediately due to repeated failures in executing your assigned tasks. Please pack your desk.",
                btn_return: "Return to Home"
            },
            es: {
                fired_header: "Aviso de Despido",
                fired_desc: "Su empleo ha sido terminado de inmediato debido a fallas repetidas en la ejecución de sus tareas asignadas. Por favor, recoja su escritorio.",
                btn_return: "Volver al Inicio"
            },
            fr: {
                fired_header: "Avis de Licenciement",
                fired_desc: "Votre contrat de travail est résilié avec effet immédiat en raison de manquements répétés à l'exécution des tâches qui vous ont été confiées. Veuillez libérer votre bureau.",
                btn_return: "Retour à l'Accueil"
            },
            de: {
                fired_header: "Kündigungsschreiben",
                fired_desc: "Ihr Arbeitsverhältnis wurde aufgrund wiederholter Versäumnisse bei der Ausführung Ihrer zugewiesenen Aufgaben mit sofortiger Wirkung beendet. Bitte räumen Sie Ihren Schreibtisch.",
                btn_return: "Zur Startseite"
            },
            zh: {
                fired_header: "解雇通知书",
                fired_desc: "由于您多次未能执行分配的任务，您的雇佣关系已被立即终止。请整理并离开您的办公桌。",
                btn_return: "返回首页"
            },
            ja: {
                fired_header: "解雇通知",
                fired_desc: "割り当てられたタスクの実行を何度も怠ったため、本日をもって即時解雇といたします。デスクを整理してください。",
                btn_return: "ホームに戻る"
            },
            pt: {
                fired_header: "Aviso de Demissão",
                fired_desc: "Seu contrato de trabalho foi rescindido com efeito imediato devido a falhas repetidas na execução das tarefas atribuídas. Por favor, esvazie sua mesa.",
                btn_return: "Voltar ao Início"
            },
            ru: {
                fired_header: "Уведомление об увольнении",
                fired_desc: "Ваш трудовой договор расторгнут немедленно в связи с неоднократным невыполнением порученных вам задач. Пожалуйста, освободите рабочее место.",
                btn_return: "Вернуться на главную"
            },
            ar: {
                fired_header: "إشعار إنهاء الخدمة",
                fired_desc: "تم إنهاء عملك بأثر فوري بسبب الفشل المتكرر في تنفيذ المهام الموكلة إليك. يرجى جمع متعلقاتك ومغادرة مكتبك.",
                btn_return: "العودة إلى الصفحة الرئيسية"
            },
            hi: {
                fired_header: "समाप्ति का नोटिस",
                fired_desc: "आपके द्वारा सौंपे गए कार्यों को निष्पादित करने में बार-बार विफल रहने के कारण आपके रोजगार को तत्काल प्रभाव से समाप्त कर दिया गया है। कृपया अपना डेस्क खाली करें।",
                btn_return: "होम पर लौटें"
            },
            gu: {
                fired_header: "બરતરફીની નોટિસ",
                fired_desc: "તમારા સોંપાયેલ કાર્યોને ચલાવવામાં વારંવાર નિષ્ફળતાને કારણે તમારી નોકરી તાત્કાલિક અસરથી સમાપ્ત કરવામાં આવી છે. મહેરબાની કરીને તમારું ડેસ્ક ખાલી કરો.",
                btn_return: "હોમ પર પાછા ફરો"
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('company_sim_lang') || 'en';
            const dictionary = translations[savedLang] || translations['en'];
            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                if (dictionary[key]) {
                    el.textContent = dictionary[key];
                }
            });
        });
    </script>
</body>
</html>
